<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glaise gallery sample</title>
<link rel="stylesheet" href="../../skills/glaise/references/tokens.css">
<!-- PIGMENT: swap per capture; remove the line entirely for the default skin -->
<link rel="stylesheet" href="../../skills/glaise-brand/references/pigments/celadon.css">
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: var(--glaise-font-sans);
    background: var(--glaise-canvas);
    color: var(--glaise-ink);
    display: flex; gap: var(--glaise-space-sm); height: 100vh; overflow: hidden;
    padding: var(--glaise-space-sm);
  }
  /* Floating sidebar — the family default: a detached surface-1 card with a
     canvas gutter on all sides (shells.md, Console floating mode).
     One elevation language: the shadow token alone — no border stacked on it. */
  .sidebar {
    width: 240px; background: var(--glaise-surface-1);
    border-radius: var(--glaise-radius-xl);
    box-shadow: var(--glaise-shadow-1);
    padding: var(--glaise-space-md); flex-shrink: 0;
  }
  .wordmark { font-weight: 600; font-size: var(--glaise-text-body); margin-bottom: var(--glaise-space-lg); }
  .nav-item {
    display: flex; align-items: center; gap: var(--glaise-space-xs);
    padding: 7px 10px; border-radius: var(--glaise-radius-md);
    font-size: var(--glaise-text-body-sm); color: var(--glaise-ink-muted);
    margin-bottom: 2px;
  }
  .nav-item.selected { background: var(--glaise-fill-selected); color: var(--glaise-ink); font-weight: 500; }
  .nav-item.selected .dot { background: var(--glaise-primary); }
  .dot { width: 12px; height: 12px; border-radius: var(--glaise-radius-xs); background: var(--glaise-hairline-tertiary); flex-shrink: 0; }
  main { flex: 1; padding: var(--glaise-space-lg) var(--glaise-space-xl); overflow: auto; }
  h1 { font-size: var(--glaise-text-headline); font-weight: 600; letter-spacing: -0.6px; margin-bottom: 4px; }
  .sub { color: var(--glaise-ink-subtle); font-size: var(--glaise-text-body-sm); margin-bottom: var(--glaise-space-lg); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--glaise-space-lg); margin-bottom: var(--glaise-space-xl); }
  .card {
    background: var(--glaise-surface-1);
    border-radius: var(--glaise-radius-lg); padding: var(--glaise-space-lg);
    box-shadow: var(--glaise-shadow-1);
  }
  .card .label { font-size: var(--glaise-text-caption); color: var(--glaise-ink-subtle); margin-bottom: 6px; }
  .card .value { font-size: var(--glaise-text-card-title); font-weight: 600; letter-spacing: -0.4px; font-variant-numeric: tabular-nums; }
  .pill {
    display: inline-block; background: var(--glaise-surface-2); color: var(--glaise-ink-muted);
    font-size: var(--glaise-text-caption); padding: 2px var(--glaise-space-xs);
    border-radius: var(--glaise-radius-pill); margin-top: var(--glaise-space-xs);
  }
  .pill.up { color: var(--glaise-success); }
  .row { display: flex; gap: var(--glaise-space-sm); align-items: center; }
  .btn {
    background: var(--glaise-primary); color: var(--glaise-on-primary);
    font: 500 var(--glaise-text-body-sm) var(--glaise-font-sans);
    border: 0; border-radius: var(--glaise-radius-md); padding: var(--glaise-space-xs) 14px;
  }
  .input {
    background: var(--glaise-surface-1); color: var(--glaise-ink);
    border: 1px solid var(--glaise-hairline); border-radius: var(--glaise-radius-md);
    padding: var(--glaise-space-xs) var(--glaise-space-sm);
    font: 400 var(--glaise-text-body-sm) var(--glaise-font-sans); width: 260px;
  }
</style>
</head>
<body>
  <aside class="sidebar">
    <div class="wordmark">Acme Ops</div>
    <div class="nav-item selected"><span class="dot"></span>Overview</div>
    <div class="nav-item"><span class="dot"></span>Deployments</div>
    <div class="nav-item"><span class="dot"></span>Incidents</div>
    <div class="nav-item"><span class="dot"></span>Settings</div>
  </aside>
  <main>
    <h1>Overview</h1>
    <p class="sub">Your fleet at a glance — last updated 2 min ago.</p>
    <div class="grid">
      <div class="card"><div class="label">Active services</div><div class="value">128</div><span class="pill up">▲ 4 this week</span></div>
      <div class="card"><div class="label">Error rate</div><div class="value">0.42%</div><span class="pill">last 24 h</span></div>
      <div class="card"><div class="label">P95 latency</div><div class="value">312 ms</div><span class="pill">last 24 h</span></div>
    </div>
    <div class="row">
      <input class="input" placeholder="Filter services…">
      <button class="btn">New deployment</button>
    </div>
  </main>
</body>
</html>
